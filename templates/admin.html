<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Add Food</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <style>
        .adminContainer {
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        .formGroup {
            margin-bottom: 15px;
        }
        .formGroup label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .formGroup input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #222;
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
        }
        .submitBtn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            background: #4CAF50;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        .submitBtn:active {
            background: #45a049;
            transform: scale(0.98);
        }
        
        /* Notification Popup */
        #notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
            min-width: 250px;
        }
        #notification.show {
            transform: translateX(-50%) translateY(0);
        }
        #notification.success {
            background: #4CAF50;
        }
        #notification.error {
            background: #f44336;
        }
    </style>
</head>
<body>
    <div id="notification"></div>

    <div class="appContainer">
        <header class="appHeader">
            <a href="/" style="text-decoration: none; color: inherit;"><h2>NutTracker Admin</h2></a>
        </header>

        <main class="adminContainer">
            <div class="formGroup">
                <label for="password">Admin Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>
            <div class="formGroup">
                <label for="foodName">Food Name</label>
                <input type="text" id="foodName" placeholder="e.g. Chicken Breast">
            </div>
            <div class="formGroup">
                <label for="calories">Calories (kcal)</label>
                <input type="number" id="calories" step="0.1" placeholder="0.0">
            </div>
            <div class="formGroup">
                <label for="protein">Protein (g)</label>
                <input type="number" id="protein" step="0.1" placeholder="0.0">
            </div>
            <div class="formGroup">
                <label for="carbs">Carbs (g)</label>
                <input type="number" id="carbs" step="0.1" placeholder="0.0">
            </div>
            <div class="formGroup">
                <label for="fat">Fat (g)</label>
                <input type="number" id="fat" step="0.1" placeholder="0.0">
            </div>
            <div class="formGroup">
                <label for="fiber">Fiber (g)</label>
                <input type="number" id="fiber" step="0.1" placeholder="0.0">
            </div>

            <button class="submitBtn" id="submitBtn">Add Food Item</button>
        </main>
    </div>

    <script>
        function showNotification(message, isSuccess = true) {
            const nav = document.getElementById('notification');
            nav.innerText = message;
            nav.className = isSuccess ? 'success show' : 'error show';
            
            setTimeout(() => {
                nav.classList.remove('show');
            }, 3000);
        }

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const btn = document.getElementById('submitBtn');
            const data = {
                password: document.getElementById('password').value,
                foodName: document.getElementById('foodName').value,
                calories: parseFloat(document.getElementById('calories').value) || 0,
                protein: parseFloat(document.getElementById('protein').value) || 0,
                carbs: parseFloat(document.getElementById('carbs').value) || 0,
                fat: parseFloat(document.getElementById('fat').value) || 0,
                fiber: parseFloat(document.getElementById('fiber').value) || 0
            };

            if (!data.foodName) {
                showNotification("Food Name is required.", false);
                return;
            }

            btn.disabled = true;
            btn.innerText = "Adding...";

            try {
                const response = await fetch('/api/admin/addFood', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                if (response.ok) {
                    showNotification(result.message || "Food added successfully!");
                    // Clear inputs except password
                    document.getElementById('foodName').value = '';
                    document.getElementById('calories').value = '';
                    document.getElementById('protein').value = '';
                    document.getElementById('carbs').value = '';
                    document.getElementById('fat').value = '';
                    document.getElementById('fiber').value = '';
                } else {
                    showNotification(result.error || "Something went wrong.", false);
                }
            } catch (error) {
                showNotification("Network error: " + error.message, false);
            } finally {
                btn.disabled = false;
                btn.innerText = "Add Food Item";
            }
        });
    </script>
</body>
</html>
