<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutTracker - Login</title>
    <link rel="stylesheet" href="../static/css/style.css?v={{ version }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background-color: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px var(--shadow-strong);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-header h2 {
            color: var(--primary-color);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <h2>NutTracker</h2>
    </div>

    <p style="margin-bottom: 20px; color: var(--text-secondary);">Please sign in to continue</p>

    <a href="/google-login" class="submitBtn" style="background-color: #ffffff; color: #757575; border: 1px solid #ddd; text-decoration: none; display: flex; justify-content: center; align-items: center; gap: 10px;">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path d="M17.64 9.20455c0-.63819-.05727-1.25182-.16364-1.84091H9v3.48136h4.84364c-.20864 1.125-.84273 2.07818-1.79591 2.71636v2.25818h2.90864c1.70182-1.56682 2.68364-3.87409 2.68364-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.46727-.80591 5.95636-2.18045l-2.90864-2.25818c-.80591.54-1.83682.85909-3.04773.85909-2.34409 0-4.32818-1.58318-5.03591-3.71045H.95727v2.33182C2.43818 15.98318 5.48182 18 9 18z" fill="#34A853"/><path d="M3.96409 10.71c-.18-.54-.28227-1.11682-.28227-1.71s.10227-1.17.28227-1.71V4.95818H.95727C.34773 6.17318 0 7.54773 0 9s.34773 2.82682.95727 4.04182L3.96409 10.71z" fill="#FBBC05"/><path d="M9 3.57955c1.32136 0 2.50773.45409 3.44045 1.34591l2.58136-2.58136C13.46318.89182 11.42591 0 9 0 5.48182 0 2.43818 2.01682.95727 4.95818L3.96409 7.29C4.67182 5.16273 6.65591 3.57955 9 3.57955z" fill="#EA4335"/></svg>
        <span>Sign in with Google</span>
    </a>
</div>

</body>
</html>
