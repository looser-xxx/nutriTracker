<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutTracker - Setup Profile</title>
    <link rel="stylesheet" href="../static/css/style.css?v={{ version }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .onboarding-card {
            background-color: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px var(--shadow-strong);
            width: 100%;
            max-width: 500px;
        }
        .header h2 {
            color: var(--primary-color);
            margin-bottom: 10px;
            text-align: center;
        }
        .header p {
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .full-width {
            grid-column: span 2;
        }
        .step {
            display: none;
        }
        .step.active {
            display: block;
        }
        .loading-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
            flex-direction: column;
        }
        .onboarding-card { position: relative; }
        
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 2s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="onboarding-card">
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loader"></div>
        <p>AI is calculating your targets...</p>
    </div>

    <!-- Step 1: Basic Profile -->
    <div id="step1" class="step active">
        <div class="header">
            <h2>Step 1: Profile</h2>
            <p>Tell us a bit about yourself.</p>
        </div>
        <div class="formGroup full-width">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" class="formControl" placeholder="e.g. Knoor" required>
        </div>
        <div class="form-grid">
            <div class="formGroup">
                <label for="age">Age</label>
                <input type="number" id="age" class="formControl" placeholder="Years" required>
            </div>
            <div class="formGroup">
                <label for="sex">Sex</label>
                <select id="sex" class="formControl" required>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div class="formGroup">
                <label for="height">Height (cm)</label>
                <input type="number" id="height" class="formControl" placeholder="cm" required>
            </div>
            <div class="formGroup">
                <label for="weight">Weight (kg)</label>
                <input type="number" id="weight" class="formControl" placeholder="kg" step="0.1" required>
            </div>
        </div>
        <div class="formGroup full-width">
            <label for="bicep">Bicep Size (inches) <small style="color:var(--text-muted)">(Optional)</small></label>
            <input type="number" id="bicep" class="formControl" placeholder="in" step="0.1">
        </div>
        <button onclick="nextStep(1)" class="submitBtn full-width" style="margin-top: 10px;">Next</button>
    </div>

    <!-- Step 2: Goals -->
    <div id="step2" class="step">
        <div class="header">
            <h2>Step 2: Goals</h2>
            <p>What do you want to achieve?</p>
        </div>
        <div class="formGroup full-width">
            <label for="fitnessGoal">Fitness Goal</label>
            <select id="fitnessGoal" class="formControl">
                <option value="lose weight">Lose Weight</option>
                <option value="gain weight">Gain Weight</option>
                <option value="maintain weight">Maintain</option>
                <option value="maingain (build muscle while staying lean)">Maingain</option>
            </select>
        </div>
        <div class="formGroup full-width">
            <label for="workoutFrequency">Workouts per week</label>
            <input type="number" id="workoutFrequency" class="formControl" placeholder="e.g. 4" min="0" max="14" required>
        </div>
        <div class="form-grid">
            <button onclick="prevStep(2)" class="submitBtn" style="background: var(--bg-secondary);">Back</button>
            <button onclick="generateAITargets()" class="submitBtn">Generate Targets</button>
        </div>
    </div>

    <!-- Step 3: Nutrition Targets -->
    <div id="step3" class="step">
        <div class="header">
            <h2>Step 3: Verify</h2>
            <p>AI-generated targets. You can tweak them if needed.</p>
        </div>
        <div class="form-grid">
            <div class="formGroup">
                <label for="targetCalories">Calories (kcal)</label>
                <input type="number" id="targetCalories" class="formControl" required>
            </div>
            <div class="formGroup">
                <label for="targetProtein">Protein (g)</label>
                <input type="number" id="targetProtein" class="formControl" required>
            </div>
            <div class="formGroup">
                <label for="targetCarbs">Carbs (g)</label>
                <input type="number" id="targetCarbs" class="formControl" required>
            </div>
            <div class="formGroup">
                <label for="targetFat">Fat (g)</label>
                <input type="number" id="targetFat" class="formControl" required>
            </div>
            <div class="formGroup full-width">
                <label for="targetFiber">Fiber (g)</label>
                <input type="number" id="targetFiber" class="formControl" required>
            </div>
        </div>
        <div class="form-grid">
            <button onclick="prevStep(3)" class="submitBtn" style="background: var(--bg-secondary);">Back</button>
            <button onclick="saveFinalProfile()" class="submitBtn">Finish Setup</button>
        </div>
    </div>
</div>

<script>
    function showStep(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
    }

    function nextStep(current) {
        if (current === 1) {
            saveBasicProfile();
        }
    }

    function prevStep(current) {
        showStep(current - 1);
    }

    async function saveBasicProfile() {
        const payload = {
            fullName: document.getElementById('fullName').value,
            age: parseInt(document.getElementById('age').value),
            sex: document.getElementById('sex').value,
            height: parseFloat(document.getElementById('height').value),
            weight: parseFloat(document.getElementById('weight').value),
            bicepSize: parseFloat(document.getElementById('bicep').value) || 0
        };

        if (!payload.fullName || !payload.age || !payload.height || !payload.weight) {
            alert("Please fill all required fields.");
            return;
        }

        try {
            const res = await fetch('/api/saveProfile', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (data.success) {
                showStep(2);
            }
        } catch (err) {
            alert("Error saving step 1");
        }
    }

    async function generateAITargets() {
        const goal = document.getElementById('fitnessGoal').value;
        const frequency = document.getElementById('workoutFrequency').value;
        
        if (!frequency) {
            alert("Please enter workout frequency.");
            return;
        }

        document.getElementById('loadingOverlay').style.display = 'flex';

        try {
            const res = await fetch('/api/generateTargets', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ goal, frequency })
            });
            const data = await res.json();
            
            if (data.success) {
                document.getElementById('targetCalories').value = data.targets.calories;
                document.getElementById('targetProtein').value = data.targets.protein;
                document.getElementById('targetCarbs').value = data.targets.carbs;
                document.getElementById('targetFat').value = data.targets.fat;
                document.getElementById('targetFiber').value = data.targets.fiber;
                showStep(3);
            } else {
                alert("AI generation failed: " + (data.error || "Unknown error"));
            }
        } catch (err) {
            alert("Connection error while talking to AI.");
        } finally {
            document.getElementById('loadingOverlay').style.display = 'none';
        }
    }

    async function saveFinalProfile() {
        const payload = {
            calories: parseFloat(document.getElementById('targetCalories').value),
            protein: parseFloat(document.getElementById('targetProtein').value),
            carbs: parseFloat(document.getElementById('targetCarbs').value),
            fat: parseFloat(document.getElementById('targetFat').value),
            fiber: parseFloat(document.getElementById('targetFiber').value)
        };

        try {
            const res = await fetch('/api/saveTargets', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (data.success) {
                window.location.href = '/';
            }
        } catch (err) {
            alert("Error saving final targets");
        }
    }
</script>

</body>
</html>
