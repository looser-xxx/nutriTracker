services:
  web:
    build: .
    container_name: nutritracker
    ports:
      - "5050:5050"
    volumes:
      - ./instance:/app/instance
      - ./foodData.json:/app/foodData.json
      - ./exerciseData.json:/app/exerciseData.json
    env_file:
      - .env
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
